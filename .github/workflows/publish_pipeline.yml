name: publish 🚀

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  detect-version-bump:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
      version_tag: ${{ steps.check.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if commit should trigger publish
        id: check
        run: |
          CURRENT_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )

          PREVIOUS_VERSION=$(git show HEAD^1:pyproject.toml | python - <<'PY'
          import sys
          import tomllib

          data = tomllib.loads(sys.stdin.read())
          print(data["project"]["version"])
          PY
          )

          if [[ "$CURRENT_VERSION" == "$PREVIOUS_VERSION" ]]; then
            echo "Version unchanged ($CURRENT_VERSION), skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          VERSION_TAG="v$CURRENT_VERSION"
          echo "Version bump detected: $PREVIOUS_VERSION -> $CURRENT_VERSION"
          echo "should_publish=true" >> $GITHUB_OUTPUT
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT

  publish:
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push release tag
        env:
          VERSION_TAG: ${{ needs.detect-version-bump.outputs.version_tag }}
        run: |
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Tag $VERSION_TAG already exists"
            exit 1
          fi

          git tag "$VERSION_TAG" "$GITHUB_SHA"
          git push origin "$VERSION_TAG"

      - name: Build release notes from changelog
        env:
          VERSION_TAG: ${{ needs.detect-version-bump.outputs.version_tag }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          changelog_path = Path("CHANGELOG.md")
          target_heading = f"## [{os.environ['VERSION_TAG']}]"
          lines = changelog_path.read_text().splitlines()

          start = None
          for i, line in enumerate(lines):
              if line.startswith(target_heading):
                  start = i
                  break

          if start is None:
              raise SystemExit(f"Could not find changelog entry for {os.environ['VERSION_TAG']}")

          end = len(lines)
          for i in range(start + 1, len(lines)):
              if lines[i].startswith("## ["):
                  end = i
                  break

          section = "\n".join(lines[start:end]).strip()
          Path("release_notes.md").write_text(section + "\n")
          PY

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ needs.detect-version-bump.outputs.version_tag }}
        run: gh release create "$VERSION_TAG" --title "$VERSION_TAG" --notes-file release_notes.md

      - name: Retrieve Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            tatoalo/pressreader-automation
          tags: |
            type=semver,pattern=v{{version}},value=${{ needs.detect-version-bump.outputs.version_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.detect-version-bump.outputs.version_tag }}
            type=semver,pattern={{major}},value=${{ needs.detect-version-bump.outputs.version_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
